spring:
  application:
    name: ledger

  datasource:
    url: jdbc:postgresql://localhost:5432/ledger
    username: ledger
    password: ledger
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

ledger:
  security:
    username: ${LEDGER_USERNAME:admin}
    password: ${LEDGER_PASSWORD:admin}
    jwt-secret: ${LEDGER_JWT_SECRET:change-me-in-production-at-least-32-chars!}
    jwt-expiry-hours: 8
